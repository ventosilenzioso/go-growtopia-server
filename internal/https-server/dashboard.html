<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTPS Server Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .status {
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .status-title {
            font-weight: bold;
            color: #0ea5e9;
            margin-bottom: 5px;
        }
        
        .info-grid {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        
        .info-label {
            font-size: 0.85em;
            color: #64748b;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.1em;
            color: #1e293b;
            font-weight: 600;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 HTTPS Server</h1>
        <p class="subtitle">Server is running successfully</p>
        
        <div class="status">
            <div class="status-title">✓ Server Status</div>
            <div>All systems operational</div>
        </div>
        
        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">HTTP Port</div>
                <div class="info-value">80</div>
            </div>
            <div class="info-item">
                <div class="info-label">HTTPS Port</div>
                <div class="info-value">443</div>
            </div>
            <div class="info-item">
                <div class="info-label">Protocol</div>
                <div class="info-value">TLS 1.2+</div>
            </div>
        </div>
        
        <div class="footer">
            Powered by Go HTTPS Server
        </div>
    </div>
</body>
</html>
